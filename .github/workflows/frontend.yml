name: WebUI

on:
  push:
    branches: ["master"]
    paths:
      - "Speakeasy.WebUI/**"
  pull_request:
    branches: ["master"]
    paths:
      - "Speakeasy.WebUI/**"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Speakeasy.WebUI

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm build
      - run: pnpm test
